{% extends "base.html" %}
{% block title %}Study{% endblock %}
{% block content %}

    <!-- Gets flashcard partial including card and buttons -->
    {% if review %}
    {% include "partials/_flashcard.html" %}

    {% else %}
    {% include "partials/_flashcard-full.html" %}
    {% endif %}

    <!-- Links JS file for DOM manipulation -->
    
    <script type="module">

        import { initCardData, setupFlashcardActions } from "{{ url_for('display.static', filename='sets.js') }}";

        const setId = window.location.pathname.split("/").pop();
        const reviewMode = "{{ review }}";

        // Initializes data for event handlers
        let cardContainer = document.getElementById("card-div");
        let [cards, state] = await initCardData(setId, cardContainer)

        let nameHeader = document.getElementById("name-header");

        // Sets up event listeners
        setupFlashcardActions(nameHeader, cards, cardContainer, document, state, reviewMode)

    </script>

{% endblock %}
